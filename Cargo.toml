[package]
name = "duckdb-slt"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[dependencies]
anyhow = "1.0.86"
clap = { version = "4.5.23", features = ["derive"] }
duckdb = { version = "1.4.3", features = ["bundled"] }
serde = { version = "1.0.203", features = ["derive"] }
serde_json = "1.0.117"
sqllogictest = "0.29.0"

[workspace]
resolver = "3"
